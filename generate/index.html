<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassGen - 패스워드 생성기</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-3xl mx-auto">
    <header class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-xl">P</div>
        <h1 class="text-2xl font-bold">PassGen</h1>
      </div>
      <nav id="nav" class="flex gap-2"></nav>
    </header>

    <main class="card p-6 md:p-8">
      <h2 class="text-xl font-bold mb-6">패스워드 생성기</h2>

      <!-- 길이 설정 -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-3">
          <label class="font-semibold">길이</label>
          <span class="text-2xl font-bold text-blue-600"><span id="lengthValue">16</span></span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="120" value="16" class="slider">
        <div class="flex justify-between text-sm text-gray-500 mt-2">
          <span>8</span>
          <span>120</span>
        </div>
      </div>

      <!-- 문자 종류 -->
      <div class="mb-8">
        <h3 class="font-semibold mb-4">포함할 문자</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50">
            <input type="checkbox" id="useLower" checked class="w-5 h-5 text-blue-600 rounded">
            <span>영소문자 (a-z)</span>
          </label>
          <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50">
            <input type="checkbox" id="useUpper" checked class="w-5 h-5 text-blue-600 rounded">
            <span>영대문자 (A-Z)</span>
          </label>
          <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50">
            <input type="checkbox" id="useDigits" checked class="w-5 h-5 text-blue-600 rounded">
            <span>숫자 (0-9)</span>
          </label>
          <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50">
            <input type="checkbox" id="useSymbols" checked class="w-5 h-5 text-blue-600 rounded">
            <span>특수문자</span>
          </label>
        </div>
      </div>

      <!-- 특수문자 선택 -->
      <div class="mb-8" id="symbolSection">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold">사용할 특수문자</h3>
          <div class="flex gap-2">
            <button type="button" id="presetCommon" class="btn btn-secondary text-sm">자주 쓰는 특수문자</button>
            <button type="button" id="selectAllSymbols" class="btn btn-secondary text-sm">모두 선택</button>
            <button type="button" id="deselectAllSymbols" class="btn btn-secondary text-sm">모두 해제</button>
          </div>
        </div>
        <div id="symbolGrid" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- 결과 -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold">생성된 패스워드</h3>
          <button type="button" id="regenerateBtn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 21h5v-5"></path></svg>
            재생성
          </button>
        </div>
        <div class="relative">
          <div id="passwordDisplay" class="w-full min-h-[4rem] p-4 pr-14 rounded-lg border border-gray-200 bg-gray-50 font-mono text-lg break-all leading-relaxed"></div>
          <button type="button" id="copyBtn" class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-secondary p-2" title="클립보드에 복사">
            <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>
      </div>

      <!-- 강도 표시 -->
      <div class="flex items-center gap-3 text-sm">
        <span class="text-gray-500">패스워드 강도:</span>
        <span id="strengthText" class="font-semibold">-</span>
      </div>
    </main>
  </div>

  <script src="../assets/common.js"></script>
  <script src="generate.js"></script>
</body>
</html>
